server:
  host: 0.0.0.0
  port: 8080
  fps: 30
  inference_latency: 0.033
  obs_queue_timeout: 2

policy:
  type: pi05
  path: /path/to/exported/pretrained_model
  device: cuda

client:
  robot_host: 127.0.0.1
  server_address: 4090_HOSTNAME_OR_IP:8080
  actions_per_chunk: 50
  chunk_size_threshold: 0.5
  aggregate_fn_name: weighted_average
  client_device: cpu
  task: pick up the object and place it in the box
