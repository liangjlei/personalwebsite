<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ahl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f5380"/>
    </marker>
    <style>
      .box{fill:#e8eef5;stroke:#1f3a5f;stroke-width:1.5;}
      .lbl{fill:#1f3a5f;font-size:14px;font-weight:600;text-anchor:middle;}
      .flow{stroke:#2f5380;stroke-width:2;fill:none;marker-end:url(#ahl);}
      .chip{fill:#ffffff;stroke:#c8772e;stroke-width:1.3;}
      .chiptxt{fill:#9a5a1f;font-size:12px;font-weight:600;text-anchor:middle;}
    </style>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">General-Purpose LLM Agent Loop</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">ReAct planning · tool use · sandboxed execution</text>

  <!-- think-act loop -->
  <rect class="box" x="60"  y="110" width="150" height="58" rx="10"/><text class="lbl" x="135" y="145">Plan / Reason</text>
  <rect class="box" x="390" y="110" width="150" height="58" rx="10"/><text class="lbl" x="465" y="145">Select Tool</text>
  <rect class="box" x="390" y="240" width="150" height="58" rx="10"/><text class="lbl" x="465" y="275">Execute (sandbox)</text>
  <rect class="box" x="60"  y="240" width="150" height="58" rx="10"/><text class="lbl" x="135" y="275">Observe</text>

  <path class="flow" d="M210,139 L388,139"/>
  <path class="flow" d="M465,168 L465,238"/>
  <path class="flow" d="M388,269 L212,269"/>
  <path class="flow" d="M135,240 L135,170"/>

  <!-- tools -->
  <rect x="60" y="328" width="480" height="40" rx="10" fill="#1f3a5f"/>
  <text x="300" y="353" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Tools  ·  browser · code · file · shell · MCP</text>

  <!-- chips -->
  <g>
    <rect class="chip" x="60"  y="392" width="170" height="34" rx="17"/><text class="chiptxt" x="145" y="414">no invite code</text>
    <rect class="chip" x="245" y="392" width="140" height="34" rx="17"/><text class="chiptxt" x="315" y="414">pluggable LLM</text>
    <rect class="chip" x="400" y="392" width="140" height="34" rx="17"/><text class="chiptxt" x="470" y="414">open source</text>
  </g>
</svg>
