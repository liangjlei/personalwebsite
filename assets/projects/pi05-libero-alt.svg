<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">VLA Adaptation — Results</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">2,000 evaluation episodes</text>
  <g>
    <rect x="30"  y="92"  width="262" height="150" rx="12" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.4"/>
    <rect x="308" y="92"  width="262" height="150" rx="12" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.4"/>
    <rect x="30"  y="258" width="262" height="150" rx="12" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.4"/>
