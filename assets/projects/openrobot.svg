<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="orb_a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f5380"/>
    </marker>
    <style>
      .box{fill:#e8eef5;stroke:#1f3a5f;stroke-width:1.5;}
      .lbl{fill:#1f3a5f;font-size:13.5px;font-weight:600;text-anchor:middle;}
      .sub{fill:#5a5a5a;font-size:10.5px;text-anchor:middle;}
      .flow{stroke:#2f5380;stroke-width:2;fill:none;marker-end:url(#orb_a);}
      .fb{stroke:#c8772e;stroke-width:2;fill:none;stroke-dasharray:5 4;marker-end:url(#orb_a);}
      .chip{fill:#ffffff;stroke:#c8772e;stroke-width:1.3;}
      .chiptxt{fill:#9a5a1f;font-size:12px;font-weight:600;text-anchor:middle;}
    </style>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">OpenRobot: Language &#8594; Action Loop</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">natural-language task &#183; LLM planning &#183; skill execution &#183; feedback</text>

  <!-- pipeline column -->
  <rect class="box" x="210" y="92"  width="180" height="46" rx="10"/><text class="lbl" x="300" y="113">Natural-Language Task</text><text class="sub" x="300" y="129">Web / API / Voice / Bot</text>
  <rect class="box" x="210" y="158" width="180" height="46" rx="10"/><text class="lbl" x="300" y="179">LLM Understanding</text><text class="sub" x="300" y="195">GPT &#183; Qwen &#183; DeepSeek &#183; GLM</text>
  <rect class="box" x="210" y="224" width="180" height="46" rx="10"/><text class="lbl" x="300" y="245">Task Planner</text><text class="sub" x="300" y="261">decompose &#183; sequence</text>
  <rect class="box" x="210" y="290" width="180" height="46" rx="10"/><text class="lbl" x="300" y="311">Skill Executor</text><text class="sub" x="300" y="327">pick &#183; place &#183; move &#183; vision</text>
  <rect x="210" y="356" width="180" height="46" rx="10" fill="#1f3a5f"/><text x="300" y="377" fill="#ffffff" font-size="13.5" font-weight="600" text-anchor="middle">Robot Controller</text><text x="300" y="393" fill="#bcd0e6" font-size="10.5" text-anchor="middle">arm &#183; base &#183; camera SDK</text>

  <path class="flow" d="M300,138 L300,156"/>
  <path class="flow" d="M300,204 L300,222"/>
  <path class="flow" d="M300,270 L300,288"/>
  <path class="flow" d="M300,336 L300,354"/>

  <!-- feedback loop -->
  <path class="fb" d="M390,379 C470,379 470,115 392,115"/>
  <text x="486" y="250" fill="#9a5a1f" font-size="11" font-weight="600" text-anchor="middle" transform="rotate(90 486 250)">execution feedback</text>

  <!-- side rail: skills -->
  <rect x="36" y="290" width="150" height="46" rx="10" fill="#fbf2e8" stroke="#c8772e" stroke-width="1.3"/>
  <text x="111" y="311" fill="#9a5a1f" font-size="12" font-weight="700" text-anchor="middle">Pluggable Skills</text>
  <text x="111" y="327" fill="#9a5a1f" font-size="10" text-anchor="middle">auto-registered</text>

  <!-- chips -->
  <g>
    <rect class="chip" x="36"  y="408" width="150" height="30" rx="15"/><text class="chiptxt" x="111" y="428">multi-LLM</text>
    <rect class="chip" x="198" y="408" width="120" height="30" rx="15"/><text class="chiptxt" x="258" y="428">ROS2 / MoveIt2</text>
    <rect class="chip" x="330" y="408" width="100" height="30" rx="15"/><text class="chiptxt" x="380" y="428">closed loop</text>
    <rect class="chip" x="442" y="408" width="122" height="30" rx="15"/><text class="chiptxt" x="503" y="428">open source</text>
  </g>
</svg>
