<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="orb_a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f5380"/>
    </marker>
    <marker id="orb_o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8772e"/>
    </marker>
    <linearGradient id="orb_floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4250"/>
      <stop offset="1" stop-color="#222831"/>
    </linearGradient>
    <style>
      .stg{fill:#e8eef5;stroke:#1f3a5f;stroke-width:1.5;}
      .stl{fill:#1f3a5f;font-size:12.5px;font-weight:600;}
      .sts{fill:#6a7180;font-size:9.5px;}
      .num{fill:#c8772e;font-size:12px;font-weight:800;}
      .flow{stroke:#2f5380;stroke-width:2;fill:none;marker-end:url(#orb_a);}
      .grid{stroke:#5b6472;stroke-width:0.8;fill:none;}
    </style>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="42" fill="#1a2b40" font-size="21" font-weight="700">OpenRobot &#183; Language &#8594; Action</text>
  <text x="30" y="63" fill="#7a7a7a" font-size="12.5">an LLM agent that plans and drives a real dual-arm mobile robot</text>

  <!-- ============ left: agent pipeline ============ -->
  <g>
    <rect class="stg" x="28"  y="86"  width="210" height="42" rx="9"/>
    <text class="num" x="42" y="112">1</text><text class="stl" x="58" y="105">Natural-language task</text><text class="sts" x="58" y="120">Web &#183; API &#183; Voice &#183; Feishu bot</text>

    <rect class="stg" x="28"  y="150" width="210" height="42" rx="9"/>
    <text class="num" x="42" y="176">2</text><text class="stl" x="58" y="169">LLM understanding</text><text class="sts" x="58" y="184">GPT &#183; Qwen &#183; DeepSeek &#183; GLM</text>

    <rect class="stg" x="28"  y="214" width="210" height="42" rx="9"/>
    <text class="num" x="42" y="240">3</text><text class="stl" x="58" y="233">Task planner</text><text class="sts" x="58" y="248">decompose &#183; sequence steps</text>

    <rect class="stg" x="28"  y="278" width="210" height="42" rx="9"/>
    <text class="num" x="42" y="304">4</text><text class="stl" x="58" y="297">Skill executor</text><text class="sts" x="58" y="312">pick &#183; place &#183; move &#183; look</text>

    <rect x="28" y="342" width="210" height="42" rx="9" fill="#1f3a5f"/>
    <text x="42" y="368" fill="#ffd9b0" font-size="12" font-weight="800">5</text>
    <text x="58" y="361" fill="#ffffff" font-size="12.5" font-weight="600">Robot controller</text>
    <text x="58" y="376" fill="#bcd0e6" font-size="9.5">arm &#183; base &#183; camera SDK</text>

    <path class="flow" d="M133,128 L133,148"/>
    <path class="flow" d="M133,192 L133,212"/>
    <path class="flow" d="M133,256 L133,276"/>
    <path class="flow" d="M133,320 L133,340"/>
  </g>

  <!-- bridge arrow into the scene -->
  <path class="flow" d="M238,363 L286,363" stroke-width="2.4"/>

  <!-- ============ right: simulated robot scene ============ -->
  <g>
    <!-- floor panel with perspective grid -->
    <rect x="290" y="92" width="282" height="318" rx="12" fill="url(#orb_floor)"/>
    <clipPath id="orb_clip"><rect x="290" y="92" width="282" height="318" rx="12"/></clipPath>
    <g clip-path="url(#orb_clip)">
      <path class="grid" d="M290,250 L572,250"/>
      <path class="grid" d="M290,290 L572,290"/>
      <path class="grid" d="M290,338 L572,338"/>
      <path class="grid" d="M290,394 L572,394"/>
      <path class="grid" d="M360,230 L300,410"/>
      <path class="grid" d="M420,230 L408,410"/>
      <path class="grid" d="M480,230 L505,410"/>
      <path class="grid" d="M540,230 L585,410"/>
    </g>

    <!-- ===== table + red target cube ===== -->
    <g>
      <polygon points="496,300 566,300 552,312 482,312" fill="#9a6a3a"/>
      <rect x="482" y="312" width="70" height="6" fill="#7a5230"/>
      <rect x="487" y="318" width="6" height="70" fill="#6e4a2b"/>
      <rect x="541" y="318" width="6" height="70" fill="#6e4a2b"/>
      <rect x="500" y="318" width="5" height="62" fill="#5e3f24"/>
      <rect x="529" y="318" width="5" height="62" fill="#5e3f24"/>
      <!-- red cube -->
      <polygon points="512,286 532,286 526,294 506,294" fill="#f06a6a"/>
      <rect x="506" y="294" width="20" height="13" fill="#d83a3a"/>
      <rect x="526" y="290" width="6" height="17" fill="#b62a2a"/>
    </g>

    <!-- ===== XLeRobot: wheeled cart with 3 baskets + dual arms ===== -->
    <g stroke-linejoin="round" stroke-linecap="round">
      <!-- shadow -->
      <ellipse cx="392" cy="392" rx="58" ry="9" fill="#1a1f27" opacity="0.55"/>
      <!-- frame posts -->
      <rect x="352" y="250" width="80" height="138" rx="6" fill="none" stroke="#dfe4ea" stroke-width="3"/>
      <!-- three baskets -->
      <rect x="356" y="268" width="72" height="24" rx="4" fill="#eef1f4" stroke="#b9c0c9" stroke-width="1.4"/>
      <rect x="356" y="300" width="72" height="24" rx="4" fill="#e3e7ec" stroke="#b9c0c9" stroke-width="1.4"/>
      <rect x="356" y="332" width="72" height="24" rx="4" fill="#d7dce2" stroke="#b9c0c9" stroke-width="1.4"/>
      <!-- top deck -->
      <rect x="350" y="244" width="84" height="9" rx="3" fill="#cfd5dc"/>
      <!-- wheels -->
      <circle cx="362" cy="384" r="9" fill="#2b2f36" stroke="#11141a" stroke-width="2"/>
      <circle cx="422" cy="384" r="9" fill="#2b2f36" stroke="#11141a" stroke-width="2"/>
      <circle cx="362" cy="384" r="3" fill="#6a7180"/>
      <circle cx="422" cy="384" r="3" fill="#6a7180"/>

      <!-- ===== left arm (folded) ===== -->
      <g stroke="#33373d" stroke-width="6" fill="none">
        <path d="M372,244 L372,222 L388,210"/>
        <path d="M388,210 L408,214"/>
      </g>
      <circle cx="372" cy="244" r="4.5" fill="#2b2f36"/>
      <circle cx="372" cy="222" r="4.5" fill="#2b2f36"/>
      <circle cx="388" cy="210" r="4.5" fill="#2b2f36"/>
      <!-- left gripper / camera head -->
      <rect x="404" y="206" width="14" height="11" rx="2" fill="#23262b"/>
      <circle cx="411" cy="211.5" r="2.6" fill="#7fb4ff"/>

      <!-- ===== right arm (reaching toward the cube) ===== -->
      <g stroke="#33373d" stroke-width="6" fill="none">
        <path d="M412,244 L426,220 L452,214"/>
        <path d="M452,214 L478,232 L498,290"/>
      </g>
      <circle cx="412" cy="244" r="4.5" fill="#2b2f36"/>
      <circle cx="426" cy="220" r="4.5" fill="#2b2f36"/>
      <circle cx="452" cy="214" r="4.5" fill="#2b2f36"/>
      <circle cx="478" cy="232" r="4.5" fill="#2b2f36"/>
      <!-- right end-effector + wrist camera, near cube -->
      <rect x="492" y="284" width="14" height="11" rx="2" fill="#23262b"/>
      <circle cx="499" cy="289.5" r="2.6" fill="#7fb4ff"/>
    </g>

    <!-- camera FOV hint from wrist to cube -->
    <path d="M499,289 L516,296 L514,300 L497,294 Z" fill="#7fb4ff" opacity="0.18"/>

    <!-- scene caption -->
    <text x="300" y="402" fill="#aeb6c2" font-size="10.5" font-style="italic">MuJoCo &#183; XLeRobot dual-arm cart</text>
  </g>

  <!-- ===== feedback loop: scene state back to the agent ===== -->
  <path d="M300,118 C262,104 250,104 240,107" fill="none" stroke="#c8772e" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#orb_o)"/>
  <text x="300" y="110" fill="#c8772e" font-size="10" font-weight="700">state &amp; scene feedback</text>
</svg>
