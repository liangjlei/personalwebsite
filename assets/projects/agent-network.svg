<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ahn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f5380"/>
    </marker>
    <style>
      .node{fill:#e8eef5;stroke:#1f3a5f;stroke-width:1.5;}
      .lbl{fill:#1f3a5f;font-size:13px;font-weight:600;text-anchor:middle;}
      .link{stroke:#2f5380;stroke-width:1.8;fill:none;}
      .flow{stroke:#2f5380;stroke-width:2;fill:none;marker-end:url(#ahn);}
      .chip{fill:#ffffff;stroke:#c8772e;stroke-width:1.3;}
      .chiptxt{fill:#9a5a1f;font-size:12px;font-weight:600;text-anchor:middle;}
    </style>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">Internet of AI Agents</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">agent-to-service connectors over a shared catalog protocol</text>

  <!-- central registry -->
  <circle cx="300" cy="215" r="44" fill="#1f3a5f"/>
  <text x="300" y="211" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Agent</text>
  <text x="300" y="228" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Registry</text>

  <!-- peer agents -->
  <g>
    <rect class="node" x="60"  y="110" width="120" height="50" rx="10"/><text class="lbl" x="120" y="140">Planner Agent</text>
    <rect class="node" x="420" y="110" width="120" height="50" rx="10"/><text class="lbl" x="480" y="140">Pricing Agent</text>
    <rect class="node" x="60"  y="280" width="120" height="50" rx="10"/><text class="lbl" x="120" y="310">Catalog API</text>
    <rect class="node" x="420" y="280" width="120" height="50" rx="10"/><text class="lbl" x="480" y="310">Inventory API</text>
  </g>

  <path class="link" d="M180,135 L262,196"/>
  <path class="link" d="M420,135 L338,196"/>
  <path class="link" d="M180,300 L262,236"/>
  <path class="link" d="M420,300 L338,236"/>

  <!-- query flow -->
  <rect x="170" y="358" width="260" height="40" rx="10" fill="#e8eef5" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="300" y="383" fill="#1f3a5f" font-size="13" font-weight="600" text-anchor="middle">structured product queries · JSON</text>
  <path class="flow" d="M300,259 L300,356"/>

  <!-- chips -->
  <g>
    <rect class="chip" x="40"  y="408" width="150" height="30" rx="15"/><text class="chiptxt" x="115" y="428">brand-agnostic</text>
    <rect class="chip" x="405" y="408" width="160" height="30" rx="15"/><text class="chiptxt" x="485" y="428">rate-limited fetch</text>
  </g>
</svg>
