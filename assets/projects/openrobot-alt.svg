<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="ds2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.4" flood-color="#1a2b40" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="a_blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dcecfd"/></linearGradient>
    <linearGradient id="a_teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ebfcf7"/><stop offset="1" stop-color="#d2f3ea"/></linearGradient>
    <linearGradient id="a_green" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefcef"/><stop offset="1" stop-color="#d2f1d6"/></linearGradient>
    <linearGradient id="a_violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5efff"/><stop offset="1" stop-color="#e8defc"/></linearGradient>
    <linearGradient id="a_amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff8ea"/><stop offset="1" stop-color="#fdeccb"/></linearGradient>
    <marker id="a_ar" markerWidth="9" markerHeight="9" refX="6.2" refY="3" orient="auto"><path d="M0,0 L6.2,3 L0,6 Z" fill="#5d6b7c"/></marker>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="42" fill="#1a2b40" font-size="21" font-weight="700">OpenRobot &#183; Model Stack</text>
  <text x="30" y="63" fill="#7a7a7a" font-size="12.5">speech, vision &amp; language models behind the agent</text>

  <!-- stage captions -->
  <text x="24"  y="92"  fill="#9aa3b0" font-size="10.5" font-weight="700">SENSORS</text>
  <text x="120" y="92"  fill="#9aa3b0" font-size="10.5" font-weight="700">PERCEPTION MODELS</text>
  <text x="344" y="92"  fill="#9aa3b0" font-size="10.5" font-weight="700">REASONING</text>
  <text x="488" y="92"  fill="#9aa3b0" font-size="10.5" font-weight="700">OUTPUT</text>

  <!-- modality tags -->
  <text x="24" y="124" fill="#0d9488" font-size="10.5" font-weight="800">AUDIO</text>
  <text x="24" y="222" fill="#2f9e44" font-size="10.5" font-weight="800">VISION</text>

  <!-- ===== SENSORS ===== -->
  <g filter="url(#ds2)"><rect x="24" y="128" width="58" height="50" rx="10" fill="url(#a_teal)" stroke="#0d9488" stroke-width="1.3"/></g>
  <rect x="45" y="139" width="14" height="18" rx="7" fill="#0d9488"/><path d="M41,155 a11,11 0 0 0 22,0" fill="none" stroke="#0d9488" stroke-width="2"/><line x1="52" y1="166" x2="52" y2="170" stroke="#0d9488" stroke-width="2"/>
  <text x="53" y="174" fill="#063b3b" font-size="9.5" font-weight="700" text-anchor="middle"> </text>
  <text x="53" y="192" fill="#063b3b" font-size="10.5" font-weight="700" text-anchor="middle">Voice</text>

  <g filter="url(#ds2)"><rect x="24" y="232" width="58" height="50" rx="10" fill="url(#a_green)" stroke="#2f9e44" stroke-width="1.3"/></g>
  <rect x="38" y="244" width="30" height="22" rx="3" fill="#ffffff" stroke="#2f9e44" stroke-width="1.4"/><circle cx="53" cy="255" r="6.5" fill="none" stroke="#2f9e44" stroke-width="1.6"/><rect x="58" y="240" width="8" height="5" fill="#2f9e44"/>
  <text x="53" y="296" fill="#14532d" font-size="10.5" font-weight="700" text-anchor="middle">Camera</text>

  <!-- ===== PERCEPTION MODELS ===== -->
  <!-- audio: ASR -->
  <path d="M82 153 H96" stroke="#5d6b7c" stroke-width="2.2" fill="none" marker-end="url(#a_ar)"/>
  <g filter="url(#ds2)"><rect x="98" y="128" width="158" height="50" rx="10" fill="url(#a_teal)" stroke="#0d9488" stroke-width="1.4"/></g>
  <rect x="98" y="128" width="158" height="4.5" rx="2" fill="#0d9488"/>
  <text x="177" y="149" fill="#063b3b" font-size="12.5" font-weight="800" text-anchor="middle">VAD &#8594; Streaming ASR</text>
  <text x="177" y="166" fill="#0a5b53" font-size="10" text-anchor="middle">sherpa-onnx transducer</text>

  <!-- vision: YOLO -> Tracker -->
  <path d="M82 257 H96" stroke="#5d6b7c" stroke-width="2.2" fill="none" marker-end="url(#a_ar)"/>
  <g filter="url(#ds2)"><rect x="98" y="232" width="112" height="50" rx="10" fill="url(#a_green)" stroke="#2f9e44" stroke-width="1.4"/></g>
  <rect x="98" y="232" width="112" height="4.5" rx="2" fill="#2f9e44"/>
  <text x="154" y="253" fill="#14532d" font-size="12.5" font-weight="800" text-anchor="middle">YOLO Detector</text>
  <text x="154" y="270" fill="#1f6b34" font-size="10" text-anchor="middle">yolo26n</text>

  <path d="M210 257 H224" stroke="#5d6b7c" stroke-width="2.2" fill="none" marker-end="url(#a_ar)"/>
  <g filter="url(#ds2)"><rect x="226" y="232" width="100" height="50" rx="10" fill="url(#a_green)" stroke="#2f9e44" stroke-width="1.4"/></g>
  <rect x="226" y="232" width="100" height="4.5" rx="2" fill="#2f9e44"/>
  <text x="276" y="253" fill="#14532d" font-size="12.5" font-weight="800" text-anchor="middle">Target Tracker</text>
  <text x="276" y="270" fill="#1f6b34" font-size="9.5" text-anchor="middle">IoU &#183; max-age</text>

  <!-- vision: Scene Captioner (VLM) -->
  <path d="M53 282 V330 H96" stroke="#5d6b7c" stroke-width="2" fill="none" marker-end="url(#a_ar)"/>
  <g filter="url(#ds2)"><rect x="98" y="306" width="158" height="50" rx="10" fill="url(#a_violet)" stroke="#7b61ff" stroke-width="1.4"/></g>
  <rect x="98" y="306" width="158" height="4.5" rx="2" fill="#7b61ff"/>
  <text x="177" y="327" fill="#31166c" font-size="12.5" font-weight="800" text-anchor="middle">Scene Captioner</text>
  <text x="177" y="344" fill="#492f86" font-size="10" text-anchor="middle">VLM &#183; scene &amp; risks</text>

  <!-- ===== REASONING: LLM (tall, receives all) ===== -->
  <g filter="url(#ds2)"><rect x="344" y="150" width="118" height="160" rx="13" fill="#1f3a5f"/></g>
  <text x="403" y="216" fill="#ffffff" font-size="15" font-weight="800" text-anchor="middle">LLM</text>
  <text x="403" y="236" fill="#ffffff" font-size="14" font-weight="800" text-anchor="middle">Agent</text>
  <text x="403" y="258" fill="#bcd0e6" font-size="10" text-anchor="middle">planner</text>
  <text x="403" y="280" fill="#9fb6d0" font-size="9.5" text-anchor="middle">DeepSeek &#183; Qwen</text>
  <text x="403" y="293" fill="#9fb6d0" font-size="9.5" text-anchor="middle">GLM &#183; GPT</text>

  <!-- inputs into LLM left edge -->
  <path d="M256 153 C300 158 320 176 342 178" stroke="#0d9488" stroke-width="2" fill="none" marker-end="url(#a_ar)" stroke-dasharray="5 3"/>
  <path d="M326 250 C334 250 336 250 342 240" stroke="#2f9e44" stroke-width="2" fill="none" marker-end="url(#a_ar)" stroke-dasharray="5 3"/>
  <path d="M256 331 C300 326 320 296 342 286" stroke="#7b61ff" stroke-width="2" fill="none" marker-end="url(#a_ar)" stroke-dasharray="5 3"/>

  <!-- ===== OUTPUT ===== -->
  <g filter="url(#ds2)"><rect x="488" y="150" width="108" height="62" rx="11" fill="url(#a_amber)" stroke="#d79224" stroke-width="1.4"/></g>
  <rect x="488" y="150" width="108" height="4.5" rx="2" fill="#d79224"/>
  <text x="542" y="176" fill="#6a4708" font-size="12.5" font-weight="800" text-anchor="middle">Robot Skills</text>
  <text x="542" y="194" fill="#7c5a1c" font-size="10" text-anchor="middle">pick &#183; move &#183; follow</text>

  <g filter="url(#ds2)"><rect x="488" y="248" width="108" height="62" rx="11" fill="url(#a_blue)" stroke="#2f6fd0" stroke-width="1.4"/></g>
  <rect x="488" y="248" width="108" height="4.5" rx="2" fill="#2f6fd0"/>
  <text x="542" y="274" fill="#0f3a6e" font-size="12.5" font-weight="800" text-anchor="middle">TTS</text>
  <text x="542" y="292" fill="#36567c" font-size="10" text-anchor="middle">Doubao &#8594; speech</text>

  <path d="M462 184 C474 184 476 181 486 181" stroke="#d79224" stroke-width="2" fill="none" marker-end="url(#a_ar)"/>
  <path d="M462 276 C474 276 476 279 486 279" stroke="#2f6fd0" stroke-width="2" fill="none" marker-end="url(#a_ar)"/>

  <text x="300" y="396" fill="#5b6775" font-size="11" font-style="italic" text-anchor="middle">multimodal perception &#8594; LLM planning &#8594; action &amp; speech</text>
</svg>
