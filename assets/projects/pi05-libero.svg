<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">Fine-Tuning π0.5 on LIBERO</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">success rate · 4 suites × 10 tasks × 50 trials = 2,000 episodes</text>

  <!-- Legend -->
  <rect x="360" y="86" width="14" height="14" fill="#1f3a5f"/><text x="380" y="98" fill="#4a4a4a" font-size="12">Vanilla LoRA</text>
  <rect x="470" y="86" width="14" height="14" fill="#c8772e"/><text x="490" y="98" fill="#4a4a4a" font-size="12">Ours (5-comp.)</text>

  <!-- Gridlines + y labels (80–96%), baseline y=360, top y=90 -->
  <g stroke="#e6e3dd" stroke-width="1">
    <line x1="70" y1="360" x2="560" y2="360"/>
    <line x1="70" y1="292.5" x2="560" y2="292.5"/>
    <line x1="70" y1="225" x2="560" y2="225"/>
    <line x1="70" y1="157.5" x2="560" y2="157.5"/>
    <line x1="70" y1="90" x2="560" y2="90"/>
  </g>
  <g fill="#9a9a9a" font-size="11" text-anchor="end">
    <text x="60" y="364">80</text>
    <text x="60" y="296.5">84</text>
    <text x="60" y="229">88</text>
    <text x="60" y="161.5">92</text>
    <text x="60" y="94">96</text>
  </g>
  <line x1="70" y1="90" x2="70" y2="360" stroke="#1a2b40" stroke-width="1.5"/>

  <!-- Group: Mean (center ~210) -->
  <rect x="150" y="154.1" width="48" height="205.9" fill="#1f3a5f"/>
  <rect x="206" y="120.4" width="48" height="239.6" fill="#c8772e"/>
  <text x="174" y="147" fill="#1f3a5f" font-size="13" font-weight="700" text-anchor="middle">92.2</text>
  <text x="230" y="113" fill="#9a5a1f" font-size="13" font-weight="700" text-anchor="middle">94.2</text>
  <text x="202" y="382" fill="#1a2b40" font-size="14" font-weight="600" text-anchor="middle">Mean (all suites)</text>

  <!-- Group: LIBERO-Long (center ~420) -->
  <rect x="360" y="272.25" width="48" height="87.75" fill="#1f3a5f"/>
  <rect x="416" y="211.5" width="48" height="148.5" fill="#c8772e"/>
  <text x="384" y="265" fill="#1f3a5f" font-size="13" font-weight="700" text-anchor="middle">85.2</text>
  <text x="440" y="204" fill="#9a5a1f" font-size="13" font-weight="700" text-anchor="middle">88.8</text>
  <text x="412" y="382" fill="#1a2b40" font-size="14" font-weight="600" text-anchor="middle">LIBERO-Long</text>

  <!-- Callout -->
  <rect x="392" y="408" width="180" height="26" rx="13" fill="#fff" stroke="#c8772e" stroke-width="1.3"/>
  <text x="482" y="425" fill="#9a5a1f" font-size="12" font-weight="600" text-anchor="middle">+3.6 pt vs official ckpt</text>
  <text x="30" y="425" fill="#7a7a7a" font-size="12">flow-matching loss 0.092 → 0.018 (−80%)</text>
</svg>
