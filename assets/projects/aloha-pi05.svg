  <line x1="490" y1="120" x2="508" y2="120" stroke="#46566a" stroke-width="1.5" marker-end="url(#m)"/>
  <g fill="#fde7f4" stroke="#c026a6" stroke-width="1">
    <rect x="510" y="104" width="10" height="32" rx="2"/><rect x="522" y="104" width="10" height="32" rx="2"/><rect x="534" y="104" width="10" height="32" rx="2"/><rect x="546" y="104" width="10" height="32" rx="2"/>
  </g>
