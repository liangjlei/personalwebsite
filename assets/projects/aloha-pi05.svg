<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">Aloha π0.5 — Split-Stack Pipeline</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">teleop → dataset → A100 training → 4090 remote inference → Orin control</text>

  <!-- pipeline nodes -->
  <g font-size="13" text-anchor="middle">
    <!-- AlohaMini -->
    <rect x="28"  y="110" width="104" height="74" rx="10" fill="#e8f3ff" stroke="#2684ff" stroke-width="2"/>
    <text x="80"  y="142" fill="#0b2545" font-weight="700">AlohaMini</text>
    <text x="80"  y="162" fill="#0b2545" font-size="11">teleop leader</text>

    <!-- Dataset -->
    <rect x="160" y="110" width="104" height="74" rx="10" fill="#fff7e6" stroke="#ffb020" stroke-width="2"/>
    <text x="212" y="142" fill="#4a2a00" font-weight="700">LeRobot</text>
    <text x="212" y="162" fill="#4a2a00" font-size="11">dataset engine</text>

    <!-- A100 -->
    <rect x="292" y="110" width="104" height="74" rx="10" fill="#f4ecff" stroke="#7b61ff" stroke-width="2"/>
    <text x="344" y="142" fill="#26114d" font-weight="700">A100</text>
    <text x="344" y="162" fill="#26114d" font-size="11">π0.5 training</text>

    <!-- 4090 -->
    <rect x="424" y="110" width="104" height="74" rx="10" fill="#ffeaf6" stroke="#d946ef" stroke-width="2"/>
    <text x="476" y="142" fill="#4a044e" font-weight="700">RTX 4090</text>
    <text x="476" y="162" fill="#4a044e" font-size="11">remote infer</text>
  </g>

  <!-- arrows across top row -->
  <g stroke="#9aa3ad" stroke-width="2" marker-end="url(#ah)">
    <line x1="132" y1="147" x2="158" y2="147"/>
    <line x1="264" y1="147" x2="290" y2="147"/>
    <line x1="396" y1="147" x2="422" y2="147"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa3ad"/>
    </marker>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00a3a3"/>
    </marker>
  </defs>

  <!-- Orin closed loop -->
  <rect x="226" y="246" width="148" height="74" rx="10" fill="#e9fbf8" stroke="#00a3a3" stroke-width="2"/>
  <text x="300" y="278" fill="#063b3b" font-size="13" font-weight="700" text-anchor="middle">Orin Robot Host</text>
  <text x="300" y="298" fill="#063b3b" font-size="11" text-anchor="middle">cameras · IO · safety gate</text>

  <!-- action chunks back to Orin, observations up to 4090 -->
  <g stroke="#00a3a3" stroke-width="2" marker-end="url(#ah2)">
    <path d="M476,184 C476,240 400,250 376,272" fill="none"/>
    <path d="M226,288 C150,290 80,240 80,186" fill="none"/>
  </g>
  <text x="455" y="226" fill="#0e7c7b" font-size="11">action chunks</text>
  <text x="96"  y="226" fill="#0e7c7b" font-size="11" text-anchor="start">observations</text>

  <!-- metrics strip -->
  <g>
    <rect x="30"  y="356" width="170" height="64" rx="10" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.3"/>
    <rect x="215" y="356" width="170" height="64" rx="10" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.3"/>
    <rect x="400" y="356" width="170" height="64" rx="10" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.3"/>
  </g>
  <text x="115" y="390" fill="#1f3a5f" font-size="24" font-weight="800" text-anchor="middle">bimanual</text>
  <text x="115" y="410" fill="#5a5a5a" font-size="12" text-anchor="middle">multi-camera teleop</text>
  <text x="300" y="390" fill="#1f3a5f" font-size="24" font-weight="800" text-anchor="middle">π0.5</text>
  <text x="300" y="410" fill="#5a5a5a" font-size="12" text-anchor="middle">VLA fine-tuning</text>
  <text x="485" y="390" fill="#1f3a5f" font-size="24" font-weight="800" text-anchor="middle">4090↔Orin</text>
  <text x="485" y="410" fill="#5a5a5a" font-size="12" text-anchor="middle">closed-loop gRPC</text>
</svg>
