  <g><rect x="314" y="78" width="30" height="22" rx="3" fill="#cfe0f5" stroke="#2f6fd0" stroke-width="1"/><rect x="318" y="82" width="30" height="22" rx="3" fill="#e3eefb" stroke="#2f6fd0" stroke-width="1"/></g>
  <text x="331" y="116" fill="#3a4a5a" font-size="8.5" text-anchor="middle">RGB</text>
  <rect x="314" y="126" width="40" height="18" rx="4" fill="#eef1f5" stroke="#aab4c0" stroke-width="1"/>
  <text x="334" y="138" fill="#46566a" font-size="8" text-anchor="middle">&#8220;place&#8230;&#8221;</text>
  <text x="334" y="156" fill="#3a4a5a" font-size="8" text-anchor="middle">instruction</text>

  <!-- VLA backbone -->
  <rect x="372" y="74" width="118" height="92" rx="9" fill="#f6f2ff" stroke="#7b61ff" stroke-width="1.3"/>
  <text x="431" y="89" fill="#31166c" font-size="10.5" font-weight="800" text-anchor="middle">&#960;0.5 VLA</text>
  <rect x="382" y="96" width="98" height="28" rx="6" fill="#ffffff" stroke="#7b61ff" stroke-width="1"/>
  <use href="#frost" x="386" y="101" width="12" height="12"/>
  <text x="438" y="113" fill="#4a2f86" font-size="9" text-anchor="middle">VL backbone</text>
