  <path d="M12 252 a10 10 0 0 1 10 -10 H276 a10 10 0 0 1 10 10 V264 H12 Z" fill="#e7faf5"/>
  <text x="22" y="258" fill="#0a6b62" font-size="11.5" font-weight="800">(c) Remote Closed-Loop Inference</text>

