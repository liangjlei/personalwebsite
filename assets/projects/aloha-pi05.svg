<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfcfe"/></linearGradient>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.8" flood-color="#1a2b40" flood-opacity="0.16"/></filter>
    <marker id="m" markerWidth="8" markerHeight="8" refX="5.6" refY="2.8" orient="auto"><path d="M0,0 L5.6,2.8 L0,5.6 Z" fill="#46566a"/></marker>
    <marker id="mt" markerWidth="8" markerHeight="8" refX="5.6" refY="2.8" orient="auto"><path d="M0,0 L5.6,2.8 L0,5.6 Z" fill="#0d9488"/></marker>
    <marker id="mp" markerWidth="8" markerHeight="8" refX="5.6" refY="2.8" orient="auto"><path d="M0,0 L5.6,2.8 L0,5.6 Z" fill="#c026a6"/></marker>
    <marker id="mg" markerWidth="8" markerHeight="8" refX="5.6" refY="2.8" orient="auto"><path d="M0,0 L5.6,2.8 L0,5.6 Z" fill="#12b76a"/></marker>
    <!-- glyphs -->
    <symbol id="frost" viewBox="0 0 20 20"><g stroke="#2f6fd0" stroke-width="1.6" stroke-linecap="round"><line x1="10" y1="2" x2="10" y2="18"/><line x1="3" y1="6" x2="17" y2="14"/><line x1="17" y1="6" x2="3" y2="14"/><g stroke-width="1.2"><line x1="10" y1="5" x2="7.5" y2="3"/><line x1="10" y1="5" x2="12.5" y2="3"/><line x1="10" y1="15" x2="7.5" y2="17"/><line x1="10" y1="15" x2="12.5" y2="17"/></g></g></symbol>
    <symbol id="fire" viewBox="0 0 20 20"><path d="M10 2 C12 6 16 7 14.5 12 C14 15.5 11.5 17.5 10 17.5 C8.5 17.5 5.5 16 5.5 11.5 C5.5 8.5 8 8 7.5 5 C9 6 9 4 10 2 Z" fill="#e8852a"/><path d="M10 9 C11 11 11.5 12 11 13.5 C10.6 15 9.6 15.5 9 15.2 C8.2 14.8 8 13.8 8.6 12.5 C9 11.5 9.6 11 10 9 Z" fill="#ffd9a8"/></symbol>
    <symbol id="cam" viewBox="0 0 24 18"><rect x="1" y="4" width="22" height="13" rx="2.5" fill="#cfe0f5" stroke="#2f6fd0" stroke-width="1.2"/><path d="M7 4 L9 1.5 H15 L17 4 Z" fill="#cfe0f5" stroke="#2f6fd0" stroke-width="1.2"/><circle cx="12" cy="10.5" r="4" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.2"/><circle cx="12" cy="10.5" r="1.7" fill="#2f6fd0"/></symbol>
    <symbol id="arm" viewBox="0 0 32 32"><g stroke="#0d9488" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="26" width="20" height="4" rx="1.5" fill="#cdeee8" stroke-width="1.6"/><path d="M16 26 L13 16 L22 11"/><path d="M22 11 L26 7"/></g><circle cx="16" cy="26" r="2.3" fill="#0d9488"/><circle cx="13" cy="16" r="2.1" fill="#0d9488"/><path d="M25 5 l4 0 m-2 -2 l0 4" stroke="#0d9488" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="grip" viewBox="0 0 24 24"><g stroke="#7a2674" stroke-width="2" fill="none" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="9"/><rect x="6" y="9" width="12" height="4" rx="1.5" fill="#f3d4ea" stroke-width="1.6"/><path d="M8 13 L7 21"/><path d="M16 13 L17 21"/></g></symbol>
