  <text x="226" y="312" fill="#7a2674" font-size="8.5" text-anchor="middle">policy_server</text>
  <rect x="178" y="320" width="96" height="38" rx="7" fill="#ffffff" stroke="#c026a6" stroke-width="1"/>
  <text x="226" y="334" fill="#7a2674" font-size="8.5" font-weight="700" text-anchor="middle">&#960;0.5 on CUDA</text>
  <text x="226" y="346" fill="#a23f96" font-size="7.5" text-anchor="middle">action-chunk</text>
  <text x="226" y="355" fill="#a23f96" font-size="7.5" text-anchor="middle">scheduler</text>

