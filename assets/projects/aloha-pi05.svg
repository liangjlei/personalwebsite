  <rect x="356" y="198" width="150" height="22" rx="11" fill="#f1ebfd" stroke="#7b61ff" stroke-width="1"/>
  <text x="431" y="213" fill="#4a2f86" font-size="9.5" font-weight="600" text-anchor="middle">A100 &#183; bf16 &#183; grad checkpointing</text>

