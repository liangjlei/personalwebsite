  <rect x="32" y="332" width="100" height="26" rx="7" fill="#ffffff" stroke="#12b76a" stroke-width="1.1"/>
  <text x="82" y="343" fill="#067647" font-size="8.5" font-weight="700" text-anchor="middle">safety gate</text>
  <text x="82" y="353" fill="#2f8f63" font-size="7.5" text-anchor="middle">clamp &#183; watchdog</text>

