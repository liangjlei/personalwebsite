  <rect width="600" height="450" fill="url(#pg)"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>

  <!-- title + banner + legend -->
  <text x="14" y="26" fill="#12233a" font-size="16" font-weight="800" letter-spacing="-0.2">Aloha&#160;&#960;0.5 LeRobot &#8212; Real-Robot VLA Pipeline</text>
  <g>
    <use href="#frost" x="372" y="13" width="13" height="13"/><text x="388" y="24" fill="#46566a" font-size="10.5">Frozen</text>
    <use href="#fire" x="436" y="13" width="13" height="13"/><text x="452" y="24" fill="#46566a" font-size="10.5">Training</text>
  </g>
  <rect x="500" y="11" width="86" height="18" rx="9" fill="#1f3a5f"/>
  <text x="543" y="24" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">LeRobot &#183; 2026</text>

  <!-- ================= PANEL A : Teleoperation & Data ================= -->
  <g filter="url(#ds)"><rect x="12" y="36" width="284" height="198" rx="10" fill="#ffffff" stroke="#dde3ea" stroke-width="1.1"/></g>
  <path d="M12 46 a10 10 0 0 1 10 -10 H276 a10 10 0 0 1 10 10 V58 H12 Z" fill="#e8f1fd"/>
  <text x="22" y="52" fill="#1a4d8f" font-size="11.5" font-weight="800">(a) Teleoperation &amp; Data Collection</text>

  <use href="#arm" x="22" y="92" width="40" height="40"/>
  <text x="42" y="146" fill="#0a5b53" font-size="9.5" text-anchor="middle">AlohaMini</text>
  <text x="42" y="157" fill="#0a5b53" font-size="9.5" text-anchor="middle">leader</text>
  <use href="#cam" x="20" y="166" width="20" height="15"/>
  <use href="#cam" x="44" y="166" width="20" height="15"/>
  <text x="42" y="192" fill="#3a4a5a" font-size="8.5" text-anchor="middle">multi-camera</text>

  <line x1="70" y1="112" x2="92" y2="112" stroke="#46566a" stroke-width="1.5" marker-end="url(#m)"/>
  <text x="81" y="106" fill="#5a6675" font-size="8" text-anchor="middle">teleop</text>

  <rect x="94" y="92" width="84" height="40" rx="8" fill="#e9fbf8" stroke="#0d9488" stroke-width="1.2"/>
  <text x="136" y="109" fill="#063b3b" font-size="10.5" font-weight="700" text-anchor="middle">AlohaPro</text>
  <text x="136" y="123" fill="#0a5b53" font-size="9" text-anchor="middle">/ Orin runtime</text>

  <line x1="136" y1="132" x2="136" y2="150" stroke="#46566a" stroke-width="1.5" marker-end="url(#m)"/>
  <rect x="86" y="152" width="100" height="34" rx="8" fill="#fff7e6" stroke="#d79224" stroke-width="1.2"/>
  <text x="136" y="167" fill="#6a4708" font-size="10" font-weight="700" text-anchor="middle">Sync Recorder</text>
  <text x="136" y="179" fill="#7c5a1c" font-size="8.5" text-anchor="middle">video+state+action</text>

  <line x1="186" y1="169" x2="206" y2="169" stroke="#46566a" stroke-width="1.5" marker-end="url(#m)"/>
  <!-- dataset cylinder -->
  <g>
    <path d="M210 150 h60 v44 a30 8 0 0 1 -60 0 Z" fill="#fdeccb" stroke="#d79224" stroke-width="1.2"/>
    <ellipse cx="240" cy="150" rx="30" ry="8" fill="#fff7e6" stroke="#d79224" stroke-width="1.2"/>
    <text x="240" y="172" fill="#6a4708" font-size="10" font-weight="700" text-anchor="middle">LeRobot</text>
    <text x="240" y="184" fill="#7c5a1c" font-size="8.5" text-anchor="middle">dataset</text>
  </g>
  <text x="240" y="210" fill="#3a4a5a" font-size="8.5" text-anchor="middle">clean &#183; delete bad &#183; merge</text>

  <!-- ================= PANEL B : Pi0.5 Training ================= -->
  <g filter="url(#ds)"><rect x="304" y="36" width="284" height="198" rx="10" fill="#ffffff" stroke="#dde3ea" stroke-width="1.1"/></g>
  <path d="M304 46 a10 10 0 0 1 10 -10 H578 a10 10 0 0 1 10 10 V58 H304 Z" fill="#f1ebfd"/>
  <text x="314" y="52" fill="#4a2f9e" font-size="11.5" font-weight="800">(b) &#960;0.5 Training on A100</text>

