  <path d="M140 300 H166" stroke="#0d9488" stroke-width="1.8" fill="none" marker-end="url(#mt)"/>
  <text x="153" y="294" fill="#0c7a70" font-size="7.5" text-anchor="middle">obs</text>
  <path d="M168 344 H142" stroke="#c026a6" stroke-width="1.8" fill="none" marker-end="url(#mp)"/>
  <text x="155" y="376" fill="#a8268f" font-size="7.5" text-anchor="middle">actions</text>
  <text x="150" y="394" fill="#3a4a5a" font-size="8.5" text-anchor="middle">gRPC over network &#183; temporal aggregation</text>
  <text x="150" y="408" fill="#5a6675" font-size="8" text-anchor="middle">large model off-board; Orin stays real-time</text>

  <!-- ================= PANEL D : Deployment & Safety ================= -->
  <g filter="url(#ds)"><rect x="304" y="242" width="284" height="200" rx="10" fill="#ffffff" stroke="#dde3ea" stroke-width="1.1"/></g>
  <path d="M304 252 a10 10 0 0 1 10 -10 H578 a10 10 0 0 1 10 10 V264 H304 Z" fill="#eafaf0"/>
  <text x="314" y="258" fill="#0a7a47" font-size="11.5" font-weight="800">(d) Deployment &amp; Safety Gate</text>

  <g fill="#fde7f4" stroke="#c026a6" stroke-width="1">
    <rect x="316" y="290" width="9" height="26" rx="2"/><rect x="327" y="290" width="9" height="26" rx="2"/><rect x="338" y="290" width="9" height="26" rx="2"/>
  </g>
  <text x="332" y="330" fill="#7a2674" font-size="8" text-anchor="middle">candidate</text>
  <text x="332" y="340" fill="#7a2674" font-size="8" text-anchor="middle">action</text>
  <line x1="350" y1="303" x2="366" y2="303" stroke="#46566a" stroke-width="1.5" marker-end="url(#m)"/>

  <!-- safety diamond -->
  <path d="M408 282 L444 308 L408 334 L372 308 Z" fill="#eafaf0" stroke="#12b76a" stroke-width="1.4"/>
  <text x="408" y="304" fill="#067647" font-size="9" font-weight="700" text-anchor="middle">safety</text>
  <text x="408" y="316" fill="#067647" font-size="9" font-weight="700" text-anchor="middle">checks</text>

  <!-- pass -->
  <path d="M444 300 H496" stroke="#12b76a" stroke-width="1.8" fill="none" marker-end="url(#mg)"/>
  <text x="470" y="294" fill="#067647" font-size="8" text-anchor="middle">&#10003; safe</text>
  <rect x="498" y="286" width="78" height="30" rx="8" fill="#e9fbf8" stroke="#0d9488" stroke-width="1.2"/>
  <text x="537" y="300" fill="#063b3b" font-size="9.5" font-weight="700" text-anchor="middle">Real Robot</text>
  <text x="537" y="311" fill="#0a5b53" font-size="8" text-anchor="middle">torque command</text>

  <!-- reject -->
  <path d="M408 334 V356 H470" stroke="#d64545" stroke-width="1.6" fill="none" stroke-dasharray="4 3" marker-end="url(#m)"/>
  <text x="408" y="350" fill="#b23333" font-size="8">&#10007; reject</text>
  <rect x="472" y="346" width="104" height="22" rx="7" fill="#fdecec" stroke="#d64545" stroke-width="1"/>
  <text x="524" y="361" fill="#b23333" font-size="8" text-anchor="middle">NaN / stale / out-of-limit</text>

  <text x="446" y="392" fill="#3a4a5a" font-size="8.5" text-anchor="middle">dry-run &#8594; no-follower &#8594; enable torque</text>
  <text x="446" y="406" fill="#5a6675" font-size="8" text-anchor="middle">stop order: client &#8594; host &#8594; policy server</text>

  <!-- offline->online deploy link note -->
  <text x="300" y="446" fill="#9aa6b2" font-size="8" text-anchor="middle">checkpoint exported in (b) is deployed to the 4090 policy server in (c)</text>
</svg>
