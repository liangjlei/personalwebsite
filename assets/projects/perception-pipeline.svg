<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f5380"/>
    </marker>
    <style>
      .box{fill:#e8eef5;stroke:#1f3a5f;stroke-width:1.5;}
      .lbl{fill:#1f3a5f;font-size:14px;font-weight:600;text-anchor:middle;}
      .flow{stroke:#2f5380;stroke-width:2;fill:none;marker-end:url(#ah);}
      .chip{fill:#ffffff;stroke:#c8772e;stroke-width:1.3;}
      .chiptxt{fill:#9a5a1f;font-size:12px;font-weight:600;text-anchor:middle;}
    </style>
  </defs>
  <rect width="600" height="450" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="30" y="44" fill="#1a2b40" font-size="21" font-weight="700">On-Device Perception &amp; Speech Pipeline</text>
  <text x="30" y="66" fill="#7a7a7a" font-size="13">ROS2 nodes · streaming · state-machine orchestration</text>

  <!-- Row 1 -->
  <g>
    <rect class="box" x="30"  y="100" width="116" height="56" rx="10"/><text class="lbl" x="88"  y="133">Mic PCM</text>
    <rect class="box" x="173" y="100" width="116" height="56" rx="10"/><text class="lbl" x="231" y="133">VAD ×3 gate</text>
    <rect class="box" x="316" y="100" width="116" height="56" rx="10"/><text class="lbl" x="374" y="133">Streaming ASR</text>
    <rect class="box" x="459" y="100" width="116" height="56" rx="10"/><text class="lbl" x="517" y="133">NLU</text>
  </g>
  <path class="flow" d="M146,128 L171,128"/>
  <path class="flow" d="M289,128 L314,128"/>
  <path class="flow" d="M432,128 L457,128"/>
  <path class="flow" d="M517,158 L517,198"/>

  <!-- Row 2 (right to left) -->
  <g>
    <rect class="box" x="459" y="200" width="116" height="56" rx="10"/><text class="lbl" x="517" y="233">VLM / SAM</text>
    <rect class="box" x="316" y="200" width="116" height="56" rx="10"/><text class="lbl" x="374" y="233">Motion Planner</text>
    <rect class="box" x="173" y="200" width="116" height="56" rx="10"/><text class="lbl" x="231" y="233">TTS</text>
  </g>
  <path class="flow" d="M457,228 L434,228"/>
  <path class="flow" d="M314,228 L291,228"/>

  <!-- Orchestrator -->
  <rect x="30" y="292" width="545" height="44" rx="10" fill="#1f3a5f"/>
  <text x="302" y="319" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">State-Machine Orchestrator  ·  decoupled ROS2 nodes</text>

  <!-- Metric chips -->
  <g>
    <rect class="chip" x="30"  y="368" width="172" height="34" rx="17"/><text class="chiptxt" x="116" y="390">partial latency 150–300 ms</text>
    <rect class="chip" x="216" y="368" width="158" height="34" rx="17"/><text class="chiptxt" x="295" y="390">VAD compute −86%</text>
    <rect class="chip" x="388" y="368" width="187" height="34" rx="17"/><text class="chiptxt" x="481" y="390">far-field recall ×3</text>
  </g>
</svg>
