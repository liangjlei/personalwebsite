<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 690" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f7f9fc"/></linearGradient>
    <linearGradient id="wanfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3f0ff"/><stop offset="1" stop-color="#e9e3ff"/></linearGradient>
    <linearGradient id="noise" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b8b8b"/><stop offset="1" stop-color="#efeaff"/></linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#1a2b40" flood-opacity="0.16"/></filter>
    <filter id="dsoft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="1.2" stdDeviation="1.6" flood-color="#1a2b40" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6.2" refY="3.1" orient="auto"><path d="M0,0 L6.2,3.1 L0,6.2 Z" fill="#46566a"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="6.2" refY="3.1" orient="auto"><path d="M0,0 L6.2,3.1 L0,6.2 Z" fill="#c026a6"/></marker>
    <marker id="at" markerWidth="9" markerHeight="9" refX="6.2" refY="3.1" orient="auto"><path d="M0,0 L6.2,3.1 L0,6.2 Z" fill="#0d9488"/></marker>
    <marker id="av" markerWidth="9" markerHeight="9" refX="6.2" refY="3.1" orient="auto"><path d="M0,0 L6.2,3.1 L0,6.2 Z" fill="#2f6fd0"/></marker>
    <symbol id="cam" viewBox="0 0 24 18"><rect x="1" y="4" width="22" height="13" rx="2.5" fill="#cfe0f5" stroke="#2f6fd0" stroke-width="1.2"/><path d="M7 4 L9 1.5 H15 L17 4 Z" fill="#cfe0f5" stroke="#2f6fd0" stroke-width="1.2"/><circle cx="12" cy="10.5" r="4" fill="#fff" stroke="#2f6fd0" stroke-width="1.2"/><circle cx="12" cy="10.5" r="1.7" fill="#2f6fd0"/></symbol>
  </defs>

  <rect width="1120" height="690" fill="url(#bg)"/>
  <rect x="0" y="0" width="1120" height="7" fill="#1f3a5f"/>

  <!-- title -->
  <text x="40" y="52" font-size="27" font-weight="800" fill="#14243a">DreamZero</text>
  <text x="197" y="52" font-size="16" fill="#5a6b80">&#8212; an action-conditioned world model built on the <tspan font-weight="700" fill="#4b3bbd">Wan2.2</tspan> video-diffusion framework</text>
  <text x="40" y="76" font-size="14" fill="#7a8698">Given one observation and an action plan, jointly imagine the future the robot would see <tspan font-weight="600" fill="#46566a">and</tspan> the joint trajectory that produces it.</text>

  <!-- ===================== (a) INPUTS ===================== -->
  <text x="40" y="118" font-size="15" font-weight="700" fill="#1f3a5f">(a) Inputs</text>

  <!-- conditioning frame w/ multi-view mini grid -->
  <g filter="url(#ds)"><rect x="40" y="132" width="196" height="150" rx="12" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.5"/></g>
  <text x="138" y="156" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f3a5f">Conditioning frame o_t</text>
  <g>
    <rect x="58" y="168" width="72" height="52" rx="4" fill="#12202f"/><rect x="134" y="168" width="42" height="52" rx="4" fill="#12202f"/><rect x="180" y="168" width="42" height="52" rx="4" fill="#0a1017"/>
    <rect x="58" y="224" width="72" height="42" rx="4" fill="#12202f"/><rect x="134" y="224" width="42" height="42" rx="4" fill="#12202f"/><rect x="180" y="224" width="42" height="42" rx="4" fill="#0a1017"/>
    <circle cx="94" cy="192" r="12" fill="#2f6b6b"/><rect x="72" y="240" width="34" height="18" rx="3" fill="#2a4a6e"/>
    <circle cx="152" cy="190" r="8" fill="#2f6b6b"/>
  </g>
  <text x="138" y="278" text-anchor="middle" font-size="10.5" fill="#8a94a6">multi-view RGB &#183; wrist + scene</text>

  <!-- action plan card -->
  <g filter="url(#ds)"><rect x="40" y="296" width="196" height="132" rx="12" fill="#fdf3fb" stroke="#c026a6" stroke-width="1.5"/></g>
  <text x="138" y="320" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7a2674">Action plan a_{t : t+k}</text>
  <g stroke-width="2" fill="none">
    <polyline points="58,376 78,360 98,384 118,352 138,372 158,346 178,368 198,356 218,378" stroke="#c026a6"/>
    <polyline points="58,404 78,398 98,408 118,392 138,402 158,388 178,400 198,394 218,406" stroke="#e07ac9"/>
  </g>
  <text x="138" y="422" text-anchor="middle" font-size="10.5" fill="#a25a98">right_j0 &#8230; right_gripper</text>

  <!-- ===================== (b) WAN2.2 BACKBONE ===================== -->
  <text x="290" y="118" font-size="15" font-weight="700" fill="#1f3a5f">(b) Wan2.2 diffusion transformer &#183; action-conditioned</text>
  <g filter="url(#ds)"><rect x="290" y="132" width="440" height="296" rx="16" fill="url(#wanfill)" stroke="#7B61FF" stroke-width="1.8"/></g>

  <!-- noisy latent -> denoise -> clean latent -->
  <text x="312" y="162" font-size="12" font-weight="700" fill="#4b3bbd">latent denoising  (T &#8594; 0)</text>
  <g filter="url(#dsoft)"><rect x="312" y="172" width="70" height="70" rx="8" fill="#7d7d7d" stroke="#5a5a5a" stroke-width="1"/></g>
  <g opacity="0.55" fill="#dcdcdc"><circle cx="326" cy="188" r="2"/><circle cx="352" cy="182" r="2"/><circle cx="370" cy="200" r="2"/><circle cx="332" cy="214" r="2"/><circle cx="360" cy="226" r="2"/><circle cx="344" cy="200" r="2"/><circle cx="322" cy="228" r="2"/><circle cx="372" cy="220" r="2"/></g>
  <text x="347" y="256" text-anchor="middle" font-size="10" fill="#6b6b6b">z_T (noise)</text>

  <!-- DiT block stack -->
  <g>
    <g filter="url(#dsoft)"><rect x="418" y="168" width="176" height="26" rx="6" fill="#ffffff" stroke="#7B61FF" stroke-width="1.2"/></g>
    <g filter="url(#dsoft)"><rect x="418" y="200" width="176" height="26" rx="6" fill="#ffffff" stroke="#7B61FF" stroke-width="1.2"/></g>
    <g filter="url(#dsoft)"><rect x="418" y="232" width="176" height="26" rx="6" fill="#ffffff" stroke="#7B61FF" stroke-width="1.2"/></g>
    <text x="506" y="185" text-anchor="middle" font-size="11" fill="#4b3bbd">DiT block &#183; self-attention</text>
    <text x="506" y="217" text-anchor="middle" font-size="11" fill="#4b3bbd">cross-attn &#8592; action + timestep</text>
    <text x="506" y="249" text-anchor="middle" font-size="11" fill="#4b3bbd">MLP &#183; AdaLN &#183; &#215; N</text>
  </g>

  <g filter="url(#dsoft)"><rect x="630" y="172" width="70" height="70" rx="8" fill="#1a3a5a" stroke="#12283f" stroke-width="1"/></g>
  <circle cx="665" cy="200" r="12" fill="#2f6b6b"/><rect x="644" y="220" width="30" height="14" rx="3" fill="#2a4a6e"/>
  <text x="665" y="256" text-anchor="middle" font-size="10" fill="#4b3bbd">z_0 (clean)</text>

  <line x1="382" y1="207" x2="416" y2="207" stroke="#7B61FF" stroke-width="1.8" marker-end="url(#av)"/>
  <line x1="594" y1="207" x2="628" y2="207" stroke="#7B61FF" stroke-width="1.8" marker-end="url(#av)"/>

  <!-- conditioning injection from action + frame -->
  <path d="M236 210 C262 214 268 214 288 214" fill="none" stroke="#2f6fd0" stroke-width="1.8" marker-end="url(#av)"/>
  <path d="M236 348 C265 340 280 300 300 264 C316 236 360 232 416 219" fill="none" stroke="#c026a6" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ap)"/>
  <text x="345" y="300" font-size="10.5" fill="#a25a98" transform="rotate(-15 345 300)">action conditioning</text>

  <!-- flow-matching / MoE note bar -->
  <g filter="url(#dsoft)"><rect x="312" y="286" width="388" height="122" rx="10" fill="#ffffff" stroke="#d7cffb" stroke-width="1.2"/></g>
  <text x="326" y="308" font-size="12" font-weight="700" fill="#4b3bbd">Why Wan2.2</text>
  <text x="326" y="330" font-size="11.5" fill="#5a6b80">&#8226; High-fidelity video diffusion prior, adapted to the robot's</text>
  <text x="336" y="347" font-size="11.5" fill="#5a6b80">   camera distribution and contact dynamics.</text>
  <text x="326" y="368" font-size="11.5" fill="#5a6b80">&#8226; Actions injected via cross-attention so generated frames</text>
  <text x="336" y="385" font-size="11.5" fill="#5a6b80">   follow the <tspan font-weight="600" fill="#7a2674">commanded</tspan> motion &#8212; not a free continuation.</text>
  <text x="326" y="404" font-size="10.5" fill="#8a94a6">SFT: denoising loss on future latents + action-regression loss</text>

  <!-- ===================== (c) OUTPUTS ===================== -->
  <text x="784" y="118" font-size="15" font-weight="700" fill="#1f3a5f">(c) Joint prediction</text>

  <!-- predicted frames filmstrip -->
  <g filter="url(#ds)"><rect x="784" y="132" width="296" height="128" rx="12" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.5"/></g>
  <text x="932" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1f3a5f">Predicted future frames  &#244;_{t+1&#8230;t+k}</text>
  <g>
    <rect x="800" y="166" width="60" height="76" rx="5" fill="#12202f"/>
    <rect x="866" y="166" width="60" height="76" rx="5" fill="#12202f"/>
    <rect x="932" y="166" width="60" height="76" rx="5" fill="#12202f"/>
    <rect x="998" y="166" width="60" height="76" rx="5" fill="#12202f"/>
    <circle cx="824" cy="196" r="10" fill="#2f6b6b"/><circle cx="892" cy="200" r="10" fill="#2f6b6b"/><circle cx="960" cy="204" r="10" fill="#2f6b6b"/><circle cx="1026" cy="208" r="10" fill="#2f6b6b"/>
    <rect x="812" y="216" width="26" height="16" rx="2" fill="#2a4a6e"/><rect x="882" y="218" width="26" height="14" rx="2" fill="#2a4a6e"/><rect x="952" y="220" width="26" height="12" rx="2" fill="#2a4a6e"/><rect x="1020" y="222" width="26" height="10" rx="2" fill="#2a4a6e"/>
  </g>
  <text x="932" y="256" text-anchor="middle" font-size="10" fill="#8a94a6">generated rollout &#8594; horizon k</text>

  <!-- predicted joint traces vs GT -->
  <g filter="url(#ds)"><rect x="784" y="274" width="296" height="154" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/></g>
  <text x="932" y="297" text-anchor="middle" font-size="13" font-weight="700" fill="#0b6b62">Predicted joint trajectory  &#226;_{t+1&#8230;t+k}</text>
  <line x1="800" y1="360" x2="1064" y2="360" stroke="#eef1f6" stroke-width="1"/>
  <path d="M802 396 C848 348 878 410 928 362 C978 320 1010 402 1062 360" fill="none" stroke="#0d9488" stroke-width="2.4"/>
  <path d="M802 400 C848 354 878 402 928 368 C978 328 1010 392 1062 366" fill="none" stroke="#c026a6" stroke-width="2" stroke-dasharray="5 4"/>
  <g font-size="10.5"><rect x="936" y="306" width="14" height="4" fill="#0d9488"/><text x="956" y="311" fill="#5a6b80">ground truth</text><rect x="936" y="318" width="14" height="4" fill="#c026a6"/><text x="956" y="323" fill="#5a6b80">prediction</text></g>
  <text x="932" y="420" text-anchor="middle" font-size="10" fill="#8a94a6">executable, aligned with the generated pixels</text>

  <line x1="730" y1="200" x2="782" y2="200" stroke="#2f6fd0" stroke-width="1.8" marker-end="url(#av)"/>
  <line x1="730" y1="330" x2="782" y2="330" stroke="#0d9488" stroke-width="1.8" marker-end="url(#at)"/>

  <!-- ===================== (d) SUPERVISION + USE ===================== -->
  <g filter="url(#ds)"><rect x="40" y="470" width="1040" height="178" rx="16" fill="#ffffff" stroke="#d7deea" stroke-width="1.4"/></g>
  <rect x="40" y="470" width="1040" height="7" rx="3.5" fill="#1f3a5f"/>
  <text x="64" y="508" font-size="15" font-weight="700" fill="#1f3a5f">(d) Real-robot supervision &#8594; a learned simulator</text>

  <!-- data source -->
  <g filter="url(#dsoft)"><rect x="64" y="524" width="300" height="100" rx="11" fill="#eef7f5" stroke="#0d9488" stroke-width="1.3"/></g>
  <text x="80" y="548" font-size="13" font-weight="700" fill="#0b6b62">Aloha-LeKiwi teleoperation</text>
  <text x="80" y="570" font-size="11.5" fill="#4a6b66">Bimanual demonstrations recorded in the</text>
  <text x="80" y="587" font-size="11.5" fill="#4a6b66">Hugging&#160;Face <tspan font-weight="600">LeRobot</tspan> format &#8212; synced multi-</text>
  <text x="80" y="604" font-size="11.5" fill="#4a6b66">view RGB + per-step joint states / actions.</text>

  <line x1="364" y1="574" x2="408" y2="574" stroke="#46566a" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- model center -->
  <g filter="url(#dsoft)"><rect x="412" y="530" width="196" height="88" rx="11" fill="url(#wanfill)" stroke="#7B61FF" stroke-width="1.4"/></g>
  <text x="510" y="566" text-anchor="middle" font-size="14" font-weight="800" fill="#4b3bbd">DreamZero</text>
  <text x="510" y="588" text-anchor="middle" font-size="11" fill="#6b5fc0">world model (Wan2.2 SFT)</text>

  <!-- three uses -->
  <g filter="url(#dsoft)"><rect x="656" y="524" width="128" height="100" rx="11" fill="#eef4fc" stroke="#2f6fd0" stroke-width="1.2"/></g>
  <text x="720" y="556" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f3a5f">Model-based</text>
  <text x="720" y="573" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f3a5f">rollout</text>
  <text x="720" y="596" text-anchor="middle" font-size="10.5" fill="#5a6b80">score actions</text>
  <text x="720" y="610" text-anchor="middle" font-size="10.5" fill="#5a6b80">before executing</text>

  <g filter="url(#dsoft)"><rect x="796" y="524" width="128" height="100" rx="11" fill="#fdf3fb" stroke="#c026a6" stroke-width="1.2"/></g>
  <text x="860" y="556" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a2674">Synthetic</text>
  <text x="860" y="573" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a2674">data</text>
  <text x="860" y="596" text-anchor="middle" font-size="10.5" fill="#a25a98">imagined demos</text>
  <text x="860" y="610" text-anchor="middle" font-size="10.5" fill="#a25a98">for VLA training</text>

  <g filter="url(#dsoft)"><rect x="936" y="524" width="120" height="100" rx="11" fill="#eef7f5" stroke="#0d9488" stroke-width="1.2"/></g>
  <text x="996" y="556" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b6b62">Dynamics</text>
  <text x="996" y="573" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b6b62">prior</text>
  <text x="996" y="596" text-anchor="middle" font-size="10.5" fill="#4a8a80">grounded in</text>
  <text x="996" y="610" text-anchor="middle" font-size="10.5" fill="#4a8a80">real contact</text>

  <line x1="608" y1="574" x2="654" y2="574" stroke="#46566a" stroke-width="1.8" marker-end="url(#a)"/>

  <text x="40" y="676" font-size="11" fill="#9aa4b4">Jinglei Liang &#183; 2026 &#183; action-conditioned robotic world model &#183; Wan2.2 backbone, SFT on Aloha-LeKiwi / LeRobot data</text>
</svg>
