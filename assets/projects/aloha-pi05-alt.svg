<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="apg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fafbfd"/></linearGradient>
    <linearGradient id="acard" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f7fb"/><stop offset="1" stop-color="#e9eef6"/></linearGradient>
    <filter id="ads" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a2b40" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="600" height="450" fill="url(#apg)"/>
  <rect x="0" y="0" width="600" height="6" fill="#1f3a5f"/>
  <text x="26" y="38" fill="#12233a" font-size="21" font-weight="700" letter-spacing="-0.3">Aloha&#160;&#960;0.5 LeRobot &#183; At a Glance</text>
  <text x="26" y="58" fill="#6a7785" font-size="12.5">real-robot manipulation: demonstration &#8594; policy &#8594; closed-loop control</text>

  <g filter="url(#ads)">
    <rect x="26"  y="84"  width="266" height="156" rx="14" fill="url(#acard)" stroke="#cfd8e4" stroke-width="1.2"/>
    <rect x="308" y="84"  width="266" height="156" rx="14" fill="url(#acard)" stroke="#cfd8e4" stroke-width="1.2"/>
    <rect x="26"  y="256" width="266" height="156" rx="14" fill="url(#acard)" stroke="#cfd8e4" stroke-width="1.2"/>
    <rect x="308" y="256" width="266" height="156" rx="14" fill="url(#acard)" stroke="#cfd8e4" stroke-width="1.2"/>
  </g>

  <text x="159" y="158" fill="#1f3a5f" font-size="40" font-weight="800" text-anchor="middle">4 machines</text>
  <text x="159" y="190" fill="#5a6675" font-size="13.5" text-anchor="middle">AlohaMini &#183; Orin &#183; A100 &#183; 4090</text>
  <text x="159" y="214" fill="#8a96a4" font-size="11.5" text-anchor="middle">one specialized stack</text>

  <text x="441" y="158" fill="#7b61ff" font-size="40" font-weight="800" text-anchor="middle">&#960;0.5 VLA</text>
  <text x="441" y="190" fill="#5a6675" font-size="13.5" text-anchor="middle">A100 fine-tuning</text>
  <text x="441" y="214" fill="#8a96a4" font-size="11.5" text-anchor="middle">bf16 + gradient checkpointing</text>

  <text x="159" y="330" fill="#c026a6" font-size="40" font-weight="800" text-anchor="middle">remote</text>
  <text x="159" y="362" fill="#5a6675" font-size="13.5" text-anchor="middle">4090 policy server</text>
  <text x="159" y="386" fill="#8a96a4" font-size="11.5" text-anchor="middle">gRPC action-chunk streaming</text>

  <text x="441" y="330" fill="#0d9488" font-size="40" font-weight="800" text-anchor="middle">safe</text>
  <text x="441" y="362" fill="#5a6675" font-size="13.5" text-anchor="middle">Orin closed loop</text>
  <text x="441" y="386" fill="#8a96a4" font-size="11.5" text-anchor="middle">watchdog + limit clamping</text>
</svg>
